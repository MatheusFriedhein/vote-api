spring.application.name=voting-api

spring.datasource.url=jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:voting}
spring.datasource.username=${DB_USERNAME:postgres}
spring.datasource.password=${DB_PASSWORD:postgres}

spring.jpa.hibernate.ddl-auto=validate
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.jdbc.batch_size=50
spring.jpa.properties.hibernate.order_inserts=true
spring.jpa.properties.hibernate.order_updates=true
spring.jpa.open-in-view=false

spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration

server.port=${SERVER_PORT:8080}

logging.level.com.example.votacao=INFO
logging.level.org.springframework.security=INFO
logging.level.org.hibernate.SQL=INFO

management.endpoints.web.exposure.include=health,info,metrics
management.endpoint.health.show-details=always

api.version=v1

integration.user-info.enabled=${INTEGRATION_USER_INFO_ENABLED:false}
integration.user-info.base-url=${INTEGRATION_USER_INFO_BASE_URL:https://user-info.herokuapp.com}
integration.user-info.connect-timeout-ms=${INTEGRATION_USER_INFO_CONNECT_TIMEOUT_MS:3000}
integration.user-info.read-timeout-ms=${INTEGRATION_USER_INFO_READ_TIMEOUT_MS:3000}
