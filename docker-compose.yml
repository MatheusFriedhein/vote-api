services:
  db:
    image: postgres:16
    container_name: assembly-voting-db
    environment:
      POSTGRES_DB: assembly_voting
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d assembly_voting"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s

  app:
    build: .
    container_name: assembly-voting-app
    depends_on:
      db:
        condition: service_healthy
    environment:
      DB_HOST: db
      DB_PORT: 5432
      DB_NAME: assembly_voting
      DB_USERNAME: postgres
      DB_PASSWORD: postgres
      SERVER_PORT: 8080
      INTEGRATION_USER_INFO_ENABLED: "false"
    ports:
      - "8080:8080"
    restart: unless-stopped

volumes:
  postgres_data:
